{% extends "base.html" %}
{% block title %}Pobierz plik — FileVault{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1>Pobierz plik</h1>
      <p class="file-dl-name">{{ file.original_name }}</p>
      <p class="text-muted">{{ file.size_human }}</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="password">Hasło do pobrania</label>
        <input type="password" id="password" name="password" required autofocus placeholder="Wprowadź hasło">
      </div>
      <button type="submit" class="btn btn-primary btn-full">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Pobierz plik
      </button>
    </form>
  </div>
</div>
{% endblock %}
