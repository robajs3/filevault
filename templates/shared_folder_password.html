{% extends "base.html" %}
{% block title %}Folder chroniony hasłem — FileVault{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1>Folder chroniony</h1>
      <p class="file-dl-name">{{ folder.name }}</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="password">Hasło do folderu</label>
        <input type="password" id="password" name="password" required autofocus placeholder="Wprowadź hasło">
      </div>
      <button type="submit" class="btn btn-primary btn-full">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Odblokuj folder
      </button>
    </form>
  </div>
</div>
{% endblock %}
