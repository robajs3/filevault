{% extends "base.html" %}
{% block title %}Rejestracja — FileVault{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <h1>Nowe konto</h1>
      <p>Utwórz swoje konto w FileVault</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="username">Nazwa użytkownika</label>
        <input type="text" id="username" name="username" required minlength="3" maxlength="80" placeholder="twoja_nazwa">
      </div>
      <div class="form-group">
        <label for="email">Adres e-mail</label>
        <input type="email" id="email" name="email" required placeholder="mail@example.com">
      </div>
      <div class="form-group">
        <label for="password">Hasło</label>
        <input type="password" id="password" name="password" required minlength="8" placeholder="Min. 8 znaków">
      </div>
      <div class="form-group">
        <label for="confirm_password">Potwierdź hasło</label>
        <input type="password" id="confirm_password" name="confirm_password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Utwórz konto</button>
    </form>
    <div class="auth-footer">
      Masz już konto? <a href="{{ url_for('auth.login') }}">Zaloguj się</a>
    </div>
  </div>
</div>
{% endblock %}
